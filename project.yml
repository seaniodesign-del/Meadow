name: Meadow
options:
  bundleIdPrefix: com.meadow
  deploymentTarget:
    iOS: "26.0"
  defaultConfig: Debug
  xcodeVersion: "16"

settings:
  base:
    SWIFT_VERSION: "6.2"
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTED_INTERFACE_ORIENTATIONS: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    ENABLE_HARDENED_RUNTIME: YES

packages:
  Model3DView:
    url: https://github.com/frzi/swiftui-model3dview
    from: "0.1.1"
  Vortex:
    url: https://github.com/twostraws/Vortex
    from: "1.0.0"

targets:
  Meadow:
    type: application
    platform: iOS
    sources:
      - path: Meadow
    info:
      path: Meadow/Resources/Info.plist
      properties:
        CFBundleDisplayName: Meadow
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSRequiresIPhoneOS: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIStatusBarHidden: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smeva.meadow
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: AVFoundation.framework
      - package: Model3DView
      - package: Vortex

  MeadowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MeadowTests
    dependencies:
      - target: Meadow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smeva.meadow.tests
